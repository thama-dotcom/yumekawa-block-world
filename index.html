<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🦄 ゆめかわブロックワールド 🍰</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; position:fixed;
    background:linear-gradient(#ffd3ec 0%, #ffe7f3 40%, #cdf2ff 100%);
    font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic',sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none; }
  #game { position:absolute; inset:0; }
  #title {
    position:absolute; top:calc(env(safe-area-inset-top) + 8px); left:50%; transform:translateX(-50%);
    font-size:17px; font-weight:bold; color:#ff7bbd;
    background:rgba(255,255,255,.75); padding:6px 18px; border-radius:999px;
    box-shadow:0 2px 8px rgba(255,120,190,.3); white-space:nowrap; pointer-events:none; z-index:5;
  }
  #hint {
    position:absolute; top:calc(env(safe-area-inset-top) + 50px); left:50%; transform:translateX(-50%);
    font-size:14px; color:#b06bd4; background:rgba(255,255,255,.7);
    padding:4px 14px; border-radius:999px; pointer-events:none; z-index:5;
    transition:opacity 1s; white-space:nowrap;
  }
  #toast {
    position:absolute; top:36%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:22px; font-weight:bold; color:#ff5fae; text-align:center;
    background:rgba(255,255,255,.93); padding:16px 28px; border-radius:32px;
    box-shadow:0 6px 24px rgba(255,120,190,.5); z-index:20; pointer-events:none;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1); white-space:nowrap;
  }
  #toast.show { transform:translate(-50%,-50%) scale(1); }
  #toast.rare { color:#b06bd4; box-shadow:0 0 30px rgba(255,215,80,.9), 0 6px 24px rgba(180,120,255,.5); }
  #bgmBtn {
    position:absolute; top:calc(env(safe-area-inset-top) + 6px); right:10px;
    width:44px; height:44px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,.8); font-size:20px; z-index:10;
    box-shadow:0 2px 8px rgba(255,120,190,.3); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #joy {
    position:absolute; left:18px; bottom:calc(env(safe-area-inset-bottom) + 108px);
    width:112px; height:112px; border-radius:50%;
    background:rgba(255,255,255,.3); border:3px solid rgba(255,255,255,.7);
    z-index:9; touch-action:none;
  }
  #joyKnob {
    position:absolute; left:50%; top:50%; width:48px; height:48px; border-radius:50%;
    background:rgba(255,255,255,.9); box-shadow:0 2px 8px rgba(255,120,190,.4);
    transform:translate(-50%,-50%); pointer-events:none;
  }
  #jumpBtn {
    position:absolute; right:18px; bottom:calc(env(safe-area-inset-bottom) + 116px);
    width:66px; height:66px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,.55); font-size:30px; z-index:9;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(255,120,190,.35); touch-action:none;
  }
  #jumpBtn:active { background:rgba(255,240,248,.9); }
  #runBtn {
    position:absolute; right:26px; bottom:calc(env(safe-area-inset-bottom) + 196px);
    width:54px; height:54px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,.55); font-size:24px; z-index:9;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(255,120,190,.35); touch-action:none;
  }
  #runBtn.on {
    background:#fff0f8; border-color:#ff7bbd;
    box-shadow:0 0 16px rgba(255,120,190,.8);
    transform:scale(1.1);
  }
  #toolbar {
    position:absolute; bottom:calc(env(safe-area-inset-bottom) + 10px); left:0; right:0;
    display:flex; gap:8px; padding:10px 12px 6px; overflow-x:auto; z-index:10;
    justify-content:flex-start; scrollbar-width:none;
  }
  #toolbar::-webkit-scrollbar { display:none; }
  .btn {
    flex:0 0 auto; width:58px; height:58px; border-radius:20px; border:3px solid #fff;
    font-size:29px; line-height:1; background:rgba(255,255,255,.85);
    box-shadow:0 3px 10px rgba(255,120,190,.35);
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s; cursor:pointer;
  }
  .btn.sel {
    transform:scale(1.18) translateY(-6px);
    border-color:#ff7bbd;
    background:#fff0f8;
    box-shadow:0 6px 16px rgba(255,120,190,.55);
  }
  .btn.egg { border-color:#ffe08a; }
  .btn.egg.sel { border-color:#ffc93c; background:#fffbe8; box-shadow:0 6px 16px rgba(255,200,60,.55); }
  .btn.small { width:48px; height:48px; font-size:22px; border-radius:16px; align-self:center; }
  .spacer { flex:1 0 8px; }
</style>
</head>
<body>
<div id="game"></div>
<div id="title">🦄 ゆめかわブロックワールド 🍰</div>
<div id="hint">スティックであるいて 🦘でジャンプ！</div>
<div id="toast"></div>
<button id="bgmBtn">🎵</button>
<div id="joy"><div id="joyKnob"></div></div>
<button id="jumpBtn">🦘</button>
<button id="runBtn">💨</button>
<div id="toolbar"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';

/* ---------- 基本セットアップ ---------- */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xffdff0, 70, 190);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 400);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.getElementById('game').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const sun = new THREE.DirectionalLight(0xfff2d8, 1.2);
sun.position.set(20, 40, 15);
scene.add(sun);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------- カメラ（オービット） ---------- */
let camTheta = 0, camPhi = 1.15, camRadius = 9;
const camTarget = new THREE.Vector3(0, 5, -2);
function updateCamera(){
  camPhi = Math.max(0.2, Math.min(1.45, camPhi));
  camRadius = Math.max(2.5, Math.min(45, camRadius));
  camera.position.set(
    camTarget.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta),
    camTarget.y + camRadius * Math.cos(camPhi),
    camTarget.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(camTarget);
}
updateCamera();

/* ---------- テクスチャ（キャンバスで手描き） ---------- */
function makeTex(draw){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d'); draw(g);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function drawSprinkles(g, n){
  const cols = ['#ff6fa5','#7ed9ff','#ffd94d','#b78bff','#7dffb0','#ffffff'];
  for(let i=0;i<n;i++){
    g.save();
    g.translate(Math.random()*128, Math.random()*128);
    g.rotate(Math.random()*Math.PI);
    g.fillStyle = cols[(Math.random()*cols.length)|0];
    g.fillRect(-6,-2,12,4);
    g.restore();
  }
}
function drawHeart(g, x, y, s, color){
  g.fillStyle = color;
  g.beginPath();
  g.moveTo(x, y + s*0.9);
  g.bezierCurveTo(x - s, y + s*0.25, x - s*0.55, y - s*0.55, x, y - s*0.1);
  g.bezierCurveTo(x + s*0.55, y - s*0.55, x + s, y + s*0.25, x, y + s*0.9);
  g.fill();
}
function drawStar(g, cx, cy, r, color){
  g.fillStyle = color;
  g.beginPath();
  for(let i=0;i<10;i++){
    const rr = i%2===0 ? r : r*0.45;
    const a = -Math.PI/2 + i*Math.PI/5;
    g[i===0?'moveTo':'lineTo'](cx + rr*Math.cos(a), cy + rr*Math.sin(a));
  }
  g.closePath(); g.fill();
}

const BLOCKS = [
  { name:'いちごケーキ', emoji:'🍰', tex: makeTex(g => {
      g.fillStyle = '#fff6ef'; g.fillRect(0,0,128,128);
      g.fillStyle = '#ffb7d5'; g.fillRect(0,42,128,22); g.fillRect(0,96,128,22);
      g.fillStyle = '#ffe3ef'; g.fillRect(0,0,128,20);
      drawSprinkles(g, 10);
    })},
  { name:'チョコ', emoji:'🍫', tex: makeTex(g => {
      g.fillStyle = '#9c6a44'; g.fillRect(0,0,128,128);
      g.strokeStyle = '#7a4e2f'; g.lineWidth = 6;
      g.strokeRect(8,8,50,50); g.strokeRect(70,8,50,50);
      g.strokeRect(8,70,50,50); g.strokeRect(70,70,50,50);
    })},
  { name:'キャンディ', emoji:'🍭', tex: makeTex(g => {
      g.fillStyle = '#ffffff'; g.fillRect(0,0,128,128);
      g.lineWidth = 16;
      const cols = ['#ff8fc0','#9fe8ff','#ff8fc0','#c9a5ff'];
      for(let i=-2;i<8;i++){
        g.strokeStyle = cols[(i+4)%cols.length];
        g.beginPath(); g.moveTo(i*32-20, 148); g.lineTo(i*32+60, -20); g.stroke();
      }
    })},
  { name:'ソーダ', emoji:'🫧', tex: makeTex(g => {
      g.fillStyle = '#aee9ff'; g.fillRect(0,0,128,128);
      g.fillStyle = 'rgba(255,255,255,.85)';
      for(let i=0;i<12;i++){
        g.beginPath();
        g.arc(Math.random()*128, Math.random()*128, 3+Math.random()*7, 0, 7);
        g.fill();
      }
    })},
  { name:'ハート', emoji:'💜', tex: makeTex(g => {
      g.fillStyle = '#e9d8ff'; g.fillRect(0,0,128,128);
      drawHeart(g, 64, 60, 42, '#ff86bd');
      drawHeart(g, 24, 24, 12, '#ffffff');
      drawHeart(g, 104, 100, 12, '#ffffff');
    })},
  { name:'レインボー', emoji:'🌈', tex: makeTex(g => {
      const cols = ['#ffb3ba','#ffdfba','#fff6ad','#baffc9','#bae1ff','#e3baff'];
      cols.forEach((c,i)=>{ g.fillStyle=c; g.fillRect(0, i*128/6, 128, 128/6+1); });
    })},
  { name:'おほしさま', emoji:'⭐', tex: makeTex(g => {
      g.fillStyle = '#fff1a8'; g.fillRect(0,0,128,128);
      drawStar(g, 64, 68, 40, '#ffffff');
      drawStar(g, 20, 20, 10, '#ffd94d');
      drawStar(g, 108, 108, 10, '#ffd94d');
    })},
  { name:'うんち', emoji:'💩', tex: makeTex(g => {
      g.fillStyle = '#ffe0f0'; g.fillRect(0,0,128,128);
      g.fillStyle = '#b07b52'; g.strokeStyle = '#8f6240'; g.lineWidth = 4;
      const blob = (cx,cy,rx,ry)=>{ g.beginPath(); g.ellipse(cx,cy,rx,ry,0,0,7); g.fill(); g.stroke(); };
      blob(64,98,44,20); blob(64,74,33,17); blob(64,53,22,14); blob(64,36,11,11);
      g.fillStyle = '#ffffff';
      g.beginPath(); g.arc(50,92,7,0,7); g.arc(78,92,7,0,7); g.fill();
      g.fillStyle = '#4a3428';
      g.beginPath(); g.arc(51,93,3,0,7); g.arc(79,93,3,0,7); g.fill();
      g.strokeStyle = '#4a3428'; g.lineWidth = 3;
      g.beginPath(); g.arc(64,100,8,0.3,Math.PI-0.3); g.stroke();
    })},
  { name:'いちごミルク', emoji:'🍓', tex: makeTex(g => {
      g.fillStyle = '#ffc9de'; g.fillRect(0,0,128,128);
      g.fillStyle = 'rgba(255,255,255,.5)';
      for(let i=0;i<8;i++){
        g.beginPath();
        g.arc(Math.random()*128, Math.random()*128, 2+Math.random()*3, 0, 7);
        g.fill();
      }
      drawHeart(g, 36, 36, 11, 'rgba(255,255,255,.85)');
      drawHeart(g, 92, 88, 11, 'rgba(255,255,255,.85)');
    })},
  { name:'ビスケット', emoji:'🍪', tex: makeTex(g => {
      g.fillStyle = '#e9c98f'; g.fillRect(0,0,128,128);
      g.strokeStyle = '#d4ad6c'; g.lineWidth = 5;
      g.strokeRect(10,10,108,108);
      g.fillStyle = '#c9a05e';
      [[40,40],[88,40],[40,88],[88,88],[64,64]].forEach(([x,y])=>{
        g.beginPath(); g.arc(x,y,6,0,7); g.fill();
      });
    })},
  { name:'メロンソーダ', emoji:'🍈', tex: makeTex(g => {
      g.fillStyle = '#b9f0c5'; g.fillRect(0,0,128,128);
      g.fillStyle = 'rgba(255,255,255,.8)';
      for(let i=0;i<10;i++){
        g.beginPath();
        g.arc(Math.random()*128, Math.random()*128, 3+Math.random()*6, 0, 7);
        g.fill();
      }
      g.fillStyle = 'rgba(126,200,150,.5)';
      for(let i=0;i<6;i++){
        g.beginPath();
        g.arc(Math.random()*128, Math.random()*128, 2+Math.random()*4, 0, 7);
        g.fill();
      }
    })},
  { name:'くさ', emoji:'🌱', tex: makeTex(g => {
      g.fillStyle = '#a5e58e'; g.fillRect(0,0,128,128);
      g.fillStyle = '#8ed676';
      for(let i=0;i<26;i++) g.fillRect(Math.random()*124, Math.random()*124, 5, 5);
      g.fillStyle = '#ffffff';
      g.beginPath(); g.arc(30,30,3,0,7); g.arc(96,74,3,0,7); g.fill();
      g.fillStyle = '#ffb3d9';
      g.beginPath(); g.arc(70,104,3,0,7); g.fill();
    })},
  { name:'ゆき', emoji:'❄️', tex: makeTex(g => {
      g.fillStyle = '#ffffff'; g.fillRect(0,0,128,128);
      g.fillStyle = '#e4f2fd';
      for(let i=0;i<18;i++) g.fillRect(Math.random()*124, Math.random()*124, 5, 5);
      drawStar(g, 36, 40, 7, '#d2e8fa');
      drawStar(g, 92, 90, 7, '#d2e8fa');
    })},
  { name:'みず', emoji:'💧', tex: makeTex(g => {
      g.fillStyle = '#8fd6f7'; g.fillRect(0,0,128,128);
      g.strokeStyle = 'rgba(255,255,255,.7)'; g.lineWidth = 4;
      for(let i=0;i<5;i++){
        g.beginPath();
        g.arc(Math.random()*128, Math.random()*128, 10+Math.random()*14, Math.PI*0.1, Math.PI*0.9);
        g.stroke();
      }
      g.fillStyle = 'rgba(255,255,255,.6)';
      for(let i=0;i<6;i++){
        g.beginPath(); g.arc(Math.random()*128, Math.random()*128, 2+Math.random()*3, 0, 7); g.fill();
      }
    })},
];
const B_CAKE=0, B_CHOCO=1, B_CANDY=2, B_SODA=3, B_HEART=4, B_RAINBOW=5, B_STAR=6,
      B_POOP=7, B_PINK=8, B_BISCUIT=9, B_MELON=10, B_GRASS=11, B_SNOW=12, B_WATER=13;

const blockMats = BLOCKS.map((b,i)=>{
  const m = new THREE.MeshLambertMaterial({ map:b.tex });
  if (i === B_WATER){ m.transparent = true; m.opacity = 0.8; }
  return m;
});
const blockGeo = new THREE.BoxGeometry(1,1,1);

/* ---------- ブロックプール（InstancedMeshで高速描画） ---------- */
const LIMIT = 48, HMAX = 24;
const POOL_CAP = {
  [B_CHOCO]: 36000, [B_GRASS]: 15000, [B_SNOW]: 8000, [B_BISCUIT]: 9000,
  [B_WATER]: 7000, [B_CANDY]: 6000, [B_PINK]: 6000
};
const pools = BLOCKS.map((b,i)=>{
  const cap = POOL_CAP[i] || 3000;
  const mesh = new THREE.InstancedMesh(blockGeo, blockMats[i], cap);
  mesh.count = 0;
  mesh.userData.type = i;
  mesh.frustumCulled = false;
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(mesh);
  return { mesh, cap, keys: [] };
});
const world = new Map(); // "x,y,z" -> { type, id }
const undoStack = [];
const popAnims = [];
const _m4 = new THREE.Matrix4();
const _q0 = new THREE.Quaternion();
const _vp = new THREE.Vector3();
const _vs = new THREE.Vector3();

function key(x,y,z){ return x+','+y+','+z; }

function setInstance(type, id, x, y, z, s){
  _m4.compose(_vp.set(x+0.5, y+0.5, z+0.5), _q0, _vs.set(s, s, s));
  pools[type].mesh.setMatrixAt(id, _m4);
  pools[type].mesh.instanceMatrix.needsUpdate = true;
}
function addBlock(x,y,z,type, silent){
  if (Math.abs(x)>LIMIT || Math.abs(z)>LIMIT || y<0 || y>HMAX) return false;
  const k = key(x,y,z);
  if (world.has(k)) return false;
  const pool = pools[type];
  if (pool.mesh.count >= pool.cap) return false;
  const id = pool.mesh.count++;
  setInstance(type, id, x, y, z, 1);
  pool.keys[id] = k;
  world.set(k, { type, id });
  if (!silent) popAnims.push({ k, x, y, z, t:0 });
  return true;
}
function removeBlock(k){
  const b = world.get(k);
  if (!b) return null;
  const pool = pools[b.type];
  const last = pool.mesh.count - 1;
  if (b.id !== last){
    pool.mesh.getMatrixAt(last, _m4);
    pool.mesh.setMatrixAt(b.id, _m4);
    const movedKey = pool.keys[last];
    pool.keys[b.id] = movedKey;
    world.get(movedKey).id = b.id;
  }
  pool.mesh.count = last;
  pool.keys.length = last;
  pool.mesh.instanceMatrix.needsUpdate = true;
  world.delete(k);
  return b.type;
}

/* ---------- 地形（ノイズで高低差） ---------- */
const hmap = new Map();      // "x,z" -> 地面のたかさ
const waterCols = new Set(); // みずのある列
const smap = new Map();      // "x,z" -> 表面ブロック
function hashN(x,z){
  let n = Math.imul(x, 374761393) + Math.imul(z, 668265263) ^ 0x5bf03635;
  n = Math.imul(n ^ (n>>>13), 1274126177);
  return ((n ^ (n>>>16)) >>> 0) / 4294967295;
}
function lerpN(a,b,t){ return a+(b-a)*t; }
function noise2(x,z){
  const xi = Math.floor(x), zi = Math.floor(z);
  const xf = x-xi, zf = z-zi;
  const u = xf*xf*(3-2*xf), v = zf*zf*(3-2*zf);
  return lerpN(
    lerpN(hashN(xi,zi), hashN(xi+1,zi), u),
    lerpN(hashN(xi,zi+1), hashN(xi+1,zi+1), u), v);
}
function inEllipse(x,z,cx,cz,rx,rz){
  const dx=(x-cx)/rx, dz=(z-cz)/rz;
  return dx*dx + dz*dz;
}
function computeHeights(){
  for(let x=-LIMIT;x<=LIMIT;x++) for(let z=-LIMIT;z<=LIMIT;z++){
    const n = noise2(x/9, z/9)*0.7 + noise2(x/4.5, z/4.5)*0.3;
    let h = 1 + Math.round(n*3);          // なだらかなおか 1..4
    let surf = B_GRASS;
    // ゆきのくに（ほくせい）
    if (inEllipse(x,z,-18,-13,11,9) < 1){ surf = B_SNOW; h = 2 + Math.round(n*3); }
    // さばく（にし）
    else if (inEllipse(x,z,-21,6,11,7) < 1){ surf = B_BISCUIT; h = 1 + Math.round(n*2); }
    // チョコマウンテンさんみゃく（ほくとう）
    const md = inEllipse(x,z,18,-9,9,7);
    if (md < 1){
      const b = 1 - Math.sqrt(md);
      h += Math.round(b*b*9 + n*2*b);
      if (h >= 8) surf = B_SNOW;
      else if (h >= 5) surf = B_CHOCO;
    }
    // キャンディピーク（ひがしのはて）
    const cd = inEllipse(x,z,39,-17,9,8);
    if (cd < 1){
      const b = 1 - Math.sqrt(cd);
      h += Math.round(b*b*10 + n*2*b);
      if (h >= 7) surf = B_CANDY;
    }
    // いちごかざん（ほくせいのはて）
    const vd = inEllipse(x,z,-36,-28,11,10);
    if (vd < 1){
      const b = 1 - Math.sqrt(vd);
      h += Math.round(b*b*13);
      if (vd < 0.05){ h = Math.max(3, h - 7); surf = B_PINK; }      // かこう（いちごマグマ）
      else if (vd < 0.13){ surf = B_PINK; }                          // ふちからあふれるいちご
      else if (h >= 7){ surf = B_CHOCO; }
    }
    // たいらなひろば（おしろ・スタートちてん・こうえん・むら・ハートのおか）
    if (Math.abs(x) <= 9 && z >= -23 && z <= 13) h = 2;
    if (x >= 7 && x <= 19 && z >= -5 && z <= 12){ h = 2; surf = B_GRASS; }
    if (x >= 25 && x <= 36 && z >= 12 && z <= 24){ h = 2; surf = B_GRASS; } // にじのむら
    if (inEllipse(x,z,-30,25,7.5,6.5) < 1){ h = 4; surf = B_GRASS; }        // ハートのおか
    // アイスのやまだい＆ピラミッドだい（たいらに）
    if (inEllipse(x,z,-16.5,-15,6.5,4.5) < 1) h = 3;
    if (inEllipse(x,z,-19,3,4,3) < 1) h = 1;
    // みずうみ（くぼち）
    const ld = inEllipse(x,z,11,18,9.5,6.5);
    if (ld < 1){ h = 0; surf = B_BISCUIT; waterCols.add(x+','+z); }
    else if (ld < 1.25){ h = Math.min(h, 1); surf = B_BISCUIT; }
    // うみ（みなみのはて）
    const seaLine = 36 + Math.sin(x/5) * 2.5;
    if (z > seaLine){ h = 0; surf = B_BISCUIT; waterCols.add(x+','+z); }
    else if (z > seaLine - 3){ h = Math.min(h, 1); surf = B_BISCUIT; } // すなはま
    // うみにうかぶしま
    if (inEllipse(x,z,10,42,4.5,3.2) < 1){
      h = 2; surf = B_BISCUIT; waterCols.delete(x+','+z);
    }
    // にじのみち
    if ((x===-1 || x===0) && z >= -5 && z <= 13) surf = B_RAINBOW;
    if (z === 15 && x >= 19 && x <= 28) surf = B_RAINBOW; // むらへのみち
    hmap.set(x+','+z, h);
    smap.set(x+','+z, surf);
  }
}

function isSolidCell(X, Y, Z){
  const b = world.get(key(X, Y, Z));
  return b !== undefined && b.type !== B_WATER;
}
function boxHits(px, py, pz){
  if (py < 0.001) return true; // いちばんそこ
  const x0 = Math.floor(px-0.3), x1 = Math.floor(px+0.3);
  const y0 = Math.floor(py+0.02), y1 = Math.floor(py+1.32);
  const z0 = Math.floor(pz-0.3), z1 = Math.floor(pz+0.3);
  for(let X=x0;X<=x1;X++) for(let Y=y0;Y<=y1;Y++) for(let Z=z0;Z<=z1;Z++)
    if (isSolidCell(X,Y,Z)) return true;
  return false;
}
function playerInWater(){
  const b = world.get(key(Math.floor(player.pos.x), Math.floor(player.pos.y+0.4), Math.floor(player.pos.z)));
  return b !== undefined && b.type === B_WATER;
}
function moveAxis(ax, d, canAutoJump){
  if (!d) return;
  const p = player.pos;
  const steps = Math.max(1, Math.ceil(Math.abs(d)/0.08));
  const sd = d/steps;
  for(let i=0;i<steps;i++){
    p[ax] += sd;
    if (boxHits(p.x, p.y, p.z)){
      p[ax] -= sd;
      if (ax === 'y'){
        if (d < 0) player.onGround = true;
        player.vel.y = 0;
      } else {
        // オートジャンプ（1ブロックのだんさ）
        if (canAutoJump && player.onGround && !boxHits(p.x, p.y+1.05, p.z)){
          player.vel.y = 7.4;
        }
        player.vel[ax] = 0;
      }
      break;
    }
  }
}

const joyEl = document.getElementById('joy');

const joy = { id:null, x:0, y:0, cx:0, cy:0 };
joyEl.addEventListener('pointerdown', e => {
  ensureAudio();
  const r = joyEl.getBoundingClientRect();
  joy.id = e.pointerId; joy.cx = r.left + r.width/2; joy.cy = r.top + r.height/2;
  joyEl.setPointerCapture(e.pointerId);
  joyMove(e);
});
joyEl.addEventListener('pointermove', e => { if (e.pointerId === joy.id) joyMove(e); });
function joyMove(e){
  let dx = e.clientX - joy.cx, dy = e.clientY - joy.cy;
  const d = Math.hypot(dx, dy), max = 42;
  if (d > max){ dx = dx/d*max; dy = dy/d*max; }
  joy.x = dx/max; joy.y = dy/max;
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}
function joyEnd(e){
  if (e.pointerId !== joy.id) return;
  joy.id = null; joy.x = 0; joy.y = 0;
  joyKnob.style.transform = 'translate(-50%,-50%)';
}
joyEl.addEventListener('pointerup', joyEnd);

function updatePlayer(dt){
  // にゅうりょく（ジョイスティック＋WASD）
  let ix = joy.x + ((keys.KeyD||keys.ArrowRight)?1:0) - ((keys.KeyA||keys.ArrowLeft)?1:0);
  let iz = joy.y + ((keys.KeyS||keys.ArrowDown)?1:0) - ((keys.KeyW||keys.ArrowUp)?1:0);
  const il = Math.hypot(ix, iz);
  if (il > 1){ ix /= il; iz /= il; }
  // カメラのむきにあわせる
  const fx = -Math.sin(camTheta), fz = -Math.cos(camTheta);
  const mvx = fx*(-iz) + (-fz)*ix;
  const mvz = fz*(-iz) + fx*ix;
  const water = playerInWater();
  const sprinting = !water && il > 0.1 && (dashOn || il > 0.97 || keys.ShiftLeft || keys.ShiftRight);
  const speed = water ? 2.6 : (sprinting ? 7.2 : 4.3);
  player.vel.x = mvx * speed;
  player.vel.z = mvz * speed;
  // ダッシュちゅうはキラキラのあしあと
  if (sprinting && player.onGround && Math.random() < dt*7){
    sparkle(new THREE.Vector3(player.pos.x, player.pos.y+0.25, player.pos.z), 1);
  }
  player.vel.y -= (water ? 5 : 22) * dt;
  if (water) player.vel.y = Math.max(player.vel.y, -1.6);

  const moving = il > 0.1;
  moveAxis('x', player.vel.x*dt, moving);
  moveAxis('z', player.vel.z*dt, moving);
  player.onGround = false;
  moveAxis('y', player.vel.y*dt, false);

  // おっこちたらリスポーン
  if (player.pos.y < -8){
    player.pos.set(0.5, groundLevelAt(0.5, 6.5), 6.5);
    player.vel.set(0,0,0);
  }

  // モデルこうしん
  const g = playerParts.group;
  g.position.copy(player.pos);
  if (moving){
    const targetYaw = Math.atan2(mvx, mvz) - Math.PI/2;
    let dr = targetYaw - g.rotation.y;
    while (dr > Math.PI) dr -= Math.PI*2;
    while (dr < -Math.PI) dr += Math.PI*2;
    g.rotation.y += dr * Math.min(1, dt*10);
    player.walk += dt * (player.vel.y === 0 && Math.hypot(player.vel.x, player.vel.z) > 5 ? 17 : 11);
  }
  const sw = moving ? Math.sin(player.walk)*0.65 : 0;
  playerParts.legL.rotation.z = sw;
  playerParts.legR.rotation.z = -sw;
  playerParts.armL.rotation.z = -sw*0.8;
  playerParts.armR.rotation.z = sw*0.8;

  // カメラはしゅじんこうについていく
  camTarget.set(player.pos.x, player.pos.y + 1.2, player.pos.z);
  updateCamera();
}

const SAVE_KEY = 'yumekawa-world-v2';
let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    const b = [];
    world.forEach((bl,k)=>{
      const [x,y,z] = k.split(',').map(Number);
      b.push([x,y,z,bl.type]);
    });
    const a = animals.map(an => [
      an.sIdx, an.colorIdx,
      Math.round(an.group.position.x*10)/10,
      Math.round(an.group.position.z*10)/10,
      an.follow ? 1 : 0
    ]);
    const p = [
      Math.round(player.pos.x*10)/10,
      Math.round(player.pos.y*10)/10,
      Math.round(player.pos.z*10)/10
    ];
    try { localStorage.setItem(SAVE_KEY, JSON.stringify({ v:8, b, a, p })); } catch(e){}
  }, 1000);
}
function loadWorld(){
  let data = null;
  try { data = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch(e){}
  if (data && Array.isArray(data.b)){
    if (data.v === 7 || data.v === 8){
      data.b.forEach(([x,y,z,t]) => addBlock(x,y,z,t,true));
    } else {
      buildMap(); // あたらしいマップに おひっこし（どうぶつは連れていく）
    }
    if (Array.isArray(data.p)){
      player.pos.set(data.p[0], data.p[1], data.p[2]);
    }
    (data.a||[]).forEach(([s,c,x,z,f]) => { const an = spawnAnimal(s,c,x,z,true); an.follow = !!f; });
    if (!animals.length) defaultAnimals();
    scheduleSave();
    return true;
  }
  return false;
}

function candyTree(tx, tz, capType){
  const b = topAt(tx, tz);
  addBlock(tx,b,tz,B_CHOCO,true); addBlock(tx,b+1,tz,B_CHOCO,true);
  for(let x=-1;x<=1;x++) for(let z=-1;z<=1;z++) addBlock(tx+x,b+2,tz+z, capType, true);
  addBlock(tx,b+3,tz, B_STAR, true);
}
function iceCreamScoop(cx, cz, base){
  const b = topAt(cx, cz);
  for(let x=-2;x<=2;x++) for(let z=-2;z<=2;z++) addBlock(cx+x,b,cz+z, base, true);
  for(let x=-1;x<=1;x++) for(let z=-1;z<=1;z++) addBlock(cx+x,b+1,cz+z, base, true);
  for(let x=-1;x<=1;x++) for(let z=-1;z<=1;z++)
    if (Math.abs(x)+Math.abs(z) < 2) addBlock(cx+x,b+2,cz+z, B_CAKE, true);
  addBlock(cx,b+3,cz,B_HEART,true); // さくらんぼハート
}
function placeOnLake(x, z, type){
  const k = key(x, 1, z);
  const w = world.get(k);
  if (w && w.type === B_WATER){ removeBlock(k); addBlock(x,1,z,type,true); }
  else addBlock(x, topAt(x,z), z, type, true);
}
function miniHouse(cx, cz, wallType, roofType){
  const b = topAt(cx, cz);
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++){
    if (dx===0 && dz===0) continue;
    for(let y=0;y<2;y++){
      if (dx===0 && dz===1) continue; // ドア（みなみむき）
      addBlock(cx+dx, b+y, cz+dz, wallType, true);
    }
  }
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++)
    addBlock(cx+dx, b+2, cz+dz, roofType, true);
  addBlock(cx, b+3, cz, B_STAR, true);
}
function buildCakeCastle(cx, cz, B){
  const in13 = (dx,dz)=> Math.abs(dx)<=6 && Math.abs(dz)<=6 && Math.abs(dx)+Math.abs(dz)<=9;
  const in9  = (dx,dz)=> Math.abs(dx)<=4 && Math.abs(dz)<=4 && Math.abs(dx)+Math.abs(dz)<=6;

  /* ケーキのどだい（2だんの まるいケーキ） */
  for(let dx=-6;dx<=6;dx++) for(let dz=-6;dz<=6;dz++){
    if (!in13(dx,dz)) continue;
    const edge13 = !(in13(dx+1,dz) && in13(dx-1,dz) && in13(dx,dz+1) && in13(dx,dz-1));
    if (edge13){
      addBlock(cx+dx,B,cz+dz,B_CAKE,true);
      addBlock(cx+dx,B+1,cz+dz,B_CAKE,true);
      if ((dx+dz+13)%3===0) addBlock(cx+dx,B+3,cz+dz,B_HEART,true); // いちごのかざり
    }
    if (!in9(dx,dz)) addBlock(cx+dx,B+2,cz+dz,B_CAKE,true); // 1だんめのうえ
    if (in9(dx,dz)){
      const edge9 = !(in9(dx+1,dz) && in9(dx-1,dz) && in9(dx,dz+1) && in9(dx,dz-1));
      if (edge9) addBlock(cx+dx,B+3,cz+dz,B_CAKE,true);
      addBlock(cx+dx,B+4,cz+dz,B_CAKE,true); // 2だんめのうえ（おしろのゆか）
    }
  }

  /* そとがわのかべ＆とう（いちごミルクいろ） */
  for(let dx=-4;dx<=4;dx++) for(let dz=-4;dz<=4;dz++){
    if (!in9(dx,dz)) continue;
    const edge9 = !(in9(dx+1,dz) && in9(dx-1,dz) && in9(dx,dz+1) && in9(dx,dz-1));
    if (!edge9) continue;
    const corner = Math.abs(dx)===3 && Math.abs(dz)===3;
    const gate = (dx===0 || dx===-1) && dz===4;
    for(let y=5;y<=7;y++){
      if (gate && y<7) continue;                    // おしろのもん
      let t = B_PINK;
      if (y===6 && (Math.abs(dx)===4 && dz===0 || dx===0 && dz===-4)) t = B_SODA; // まど
      addBlock(cx+dx,B+y,cz+dz,t,true);
    }
    if (corner){                                    // 4すみのとう＋やね
      for(let y=8;y<=10;y++) addBlock(cx+dx,B+y,cz+dz,B_PINK,true);
      addBlock(cx+dx,B+11,cz+dz,B_CANDY,true);
      addBlock(cx+dx,B+12,cz+dz,B_STAR,true);
    } else if (!gate && (dx+dz+9)%2===0){
      addBlock(cx+dx,B+8,cz+dz,B_HEART,true);       // ハートのかざりかべ
    }
  }

  /* ちゅうおうのキープ（5x5 たかさ5＋やね＋スパイア） */
  for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++){
    if (Math.max(Math.abs(dx),Math.abs(dz)) !== 2) continue;
    for(let y=5;y<=9;y++){
      let t = B_CAKE;
      if (y===7 && (dx===0 || dz===0)) t = B_SODA;  // まど
      addBlock(cx+dx,B+y,cz+dz,t,true);
    }
  }
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++) addBlock(cx+dx,B+10,cz+dz,B_CANDY,true);
  addBlock(cx,B+11,cz,B_CANDY,true);
  addBlock(cx,B+12,cz,B_PINK,true); addBlock(cx,B+13,cz,B_PINK,true);
  addBlock(cx,B+14,cz,B_CANDY,true);
  addBlock(cx,B+15,cz,B_HEART,true);                // てっぺんのハート

  /* にじのだいかいだん（みなみがわ） */
  [-1,0].forEach(x=>{
    addBlock(cx+x,B,cz+8,B_RAINBOW,true);
    addBlock(cx+x,B,cz+7,B_RAINBOW,true); addBlock(cx+x,B+1,cz+7,B_RAINBOW,true);
    addBlock(cx+x,B+3,cz+5,B_RAINBOW,true);
  });
}

let audioCtx = null, bgmGain = null;
function ensureAudio(){
  if (!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC){
      audioCtx = new AC();
      bgmGain = audioCtx.createGain();
      bgmGain.gain.value = 0.5;
      bgmGain.connect(audioCtx.destination);
    }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function note(freq, dur=0.18, vol=0.25, type='sine', when=0){
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + when;
  const o = audioCtx.createOscillator();
  const gn = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  gn.gain.setValueAtTime(vol, t0);
  gn.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}

/* ---------- BGM（オルゴールふう） ---------- */
const midi = n => 440 * Math.pow(2, (n-69)/12);
const BGM_STEP = 0.27;   // 8ぶおんぷ1つのながさ（びょう）≒111BPM
const BGM_LEN = 64;
const BGM_MELODY = [     // [ステップ, ノート]  C-G-Am-F しんこう
  [0,76],[2,79],[4,84],[6,79],
  [8,74],[10,79],[12,83],[14,79],
  [16,84],[18,81],[20,76],[22,81],
  [24,81],[26,77],[28,79],[30,81],
  [32,84],[34,86],[36,88],[38,84],
  [40,83],[42,79],[44,86],[46,83],
  [48,81],[50,84],[52,88],[54,84],
  [56,81],[58,79],[60,77],[62,79],
];
const BGM_BASS = [
  [0,48],[4,55],[8,43],[12,50],[16,45],[20,52],[24,53],[28,48],
  [32,48],[36,55],[40,43],[44,50],[48,45],[52,52],[56,53],[60,55],
];
let bgmOn = true, bgmStep = 0, bgmNextT = 0;
function bgmNote(f, t0, dur, vol){
  [[1, vol],[2, vol*0.28],[3, vol*0.09]].forEach(([mult, v])=>{
    const o = audioCtx.createOscillator();
    const gn = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f*mult;
    gn.gain.setValueAtTime(v, t0);
    gn.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(gn); gn.connect(bgmGain);
    o.start(t0); o.stop(t0 + dur + 0.05);
  });
}
setInterval(()=>{
  if (!audioCtx || !bgmOn || audioCtx.state !== 'running') return;
  if (bgmNextT < audioCtx.currentTime) bgmNextT = audioCtx.currentTime + 0.1;
  while (bgmNextT < audioCtx.currentTime + 0.7){
    const s = bgmStep % BGM_LEN;
    BGM_MELODY.forEach(([st,n])=>{ if (st === s) bgmNote(midi(n), bgmNextT, 1.1, 0.10); });
    BGM_BASS.forEach(([st,n])=>{ if (st === s) bgmNote(midi(n), bgmNextT, 0.9, 0.06); });
    bgmStep++; bgmNextT += BGM_STEP;
  }
}, 200);

function hatchEgg(i){
  const e = eggs[i];
  eggs.splice(i, 1);
  eggGroup.remove(e.mesh);
  const sIdx = rollSpecies();
  const sp = SPECIES[sIdx];
  const colorIdx = (Math.random() * sp.cols) | 0;
  const p = e.mesh.position;
  spawnAnimal(sIdx, colorIdx, p.x, p.z);
  sparkle(p.clone().add(new THREE.Vector3(0,1,0)), sp.rare ? 26 : 12);
  hatchFanfare(sp.rare);
  showToast(
    sp.rare ? `✨レア！ ${sp.name}が うまれた！${sp.emoji}✨`
            : `${sp.name}が うまれた！${sp.emoji}`,
    sp.rare
  );
}

/* ---------- ツールバー ---------- */
const toolbar = document.getElementById('toolbar');
let currentTool = 0; // 0.. = ブロック, -1 = けしゴム, -2 = たまご
const toolBtns = [];
BLOCKS.forEach((b,i)=>{
  const btn = document.createElement('button');
  btn.className = 'btn' + (i===0?' sel':'');

  btn.setAttribute('aria-label', b.name);
  btn.addEventListener('click', ()=>{ selectTool(i); ensureAudio(); note(SCALE[i%SCALE.length],0.1,0.12); });
  toolbar.appendChild(btn); toolBtns.push(btn);
});
const eggBtn = document.createElement('button');
eggBtn.className = 'btn egg'; eggBtn.textContent = '🥚';
eggBtn.addEventListener('click', ()=>{ selectTool(-2); ensureAudio(); note(392,0.1,0.15); });
toolbar.appendChild(eggBtn);

const eraserBtn = document.createElement('button');
eraserBtn.className = 'btn'; eraserBtn.textContent = '🧹';
eraserBtn.addEventListener('click', ()=>{ selectTool(-1); ensureAudio(); eraseSound(); });
toolbar.appendChild(eraserBtn);

const spacer = document.createElement('div');
spacer.className = 'spacer';
toolbar.appendChild(spacer);

const undoBtn = document.createElement('button');
undoBtn.className = 'btn small'; undoBtn.textContent = '↩️';
undoBtn.addEventListener('click', ()=>{
  ensureAudio();
  const a = undoStack.pop();
  if (!a) return;
  if (a.action === 'place') removeBlock(a.k);
  else { const [x,y,z] = a.k.split(',').map(Number); addBlock(x,y,z,a.type,true); }
  eraseSound(); scheduleSave();
});
toolbar.appendChild(undoBtn);

const resetBtn = document.createElement('button');
resetBtn.className = 'btn small'; resetBtn.textContent = '🗑️';
resetBtn.addEventListener('click', ()=>{
  if (!confirm('ぜんぶ けして さいしょから はじめる？')) return;
  [...world.keys()].forEach(removeBlock);
  animals.forEach(a => animalsGroup.remove(a.group));
  animals.length = 0;
  eggs.forEach(e => eggGroup.remove(e.mesh));
  eggs.length = 0;
  undoStack.length = 0;
  buildStarter();
});
toolbar.appendChild(resetBtn);

function selectTool(i){
  currentTool = i;
  toolBtns.forEach((btn,j)=> btn.classList.toggle('sel', j===i));
  eraserBtn.classList.toggle('sel', i===-1);
  eggBtn.classList.toggle('sel', i===-2);
}

/* ---------- タッチそうさ ---------- */
const pointers = new Map();
let downInfo = null;
let pinchDist = 0, pinchMid = null;
const cv = renderer.domElement;

cv.addEventListener('pointerdown', e => {
  ensureAudio();
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if (pointers.size === 1){
    downInfo = { x:e.clientX, y:e.clientY, t:performance.now(), moved:0 };
  } else if (pointers.size === 2){
    downInfo = null;
    const [a,b] = [...pointers.values()];
    pinchDist = Math.hypot(a.x-b.x, a.y-b.y);
    pinchMid = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
  }
});
cv.addEventListener('pointermove', e => {
  const p = pointers.get(e.pointerId);
  if (!p) return;
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;

  if (pointers.size === 1){
    if (downInfo) downInfo.moved += Math.abs(dx) + Math.abs(dy);
    camTheta -= dx * 0.006;
    camPhi   -= dy * 0.006;
    updateCamera();
  } else if (pointers.size === 2){
    const [a,b] = [...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    if (d > 0) camRadius *= pinchDist / d;
    pinchDist = d;
    updateCamera();
  }
});
function endPointer(e){
  pointers.delete(e.pointerId);
  if (downInfo && pointers.size === 0){
    const dt = performance.now() - downInfo.t;
    if (downInfo.moved < 12 && dt < 500) handleTap(e.clientX, e.clientY);
    downInfo = null;
  }
}
cv.addEventListener('pointerup', endPointer);
cv.addEventListener('pointercancel', endPointer);
cv.addEventListener('wheel', e => { camRadius *= (1 + e.deltaY*0.001); updateCamera(); }, { passive:true });

/* ---------- タップでおく / けす / なでる ---------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function handleTap(cx, cy){
  ndc.set(cx/innerWidth*2-1, -(cy/innerHeight)*2+1);
  raycaster.setFromCamera(ndc, camera);

  // どうぶつをタップしたらジャンプ！
  const aHit = raycaster.intersectObjects(animalsGroup.children, true);
  if (aHit.length){
    let obj = aHit[0].object;
    while (obj.parent && obj.parent !== animalsGroup) obj = obj.parent;
    const a = obj.userData.animal;
    if (a){
      a.jump = 1;
      a.follow = !a.follow;
      const sp = SPECIES[a.sIdx];
      animalSound(sp.id);
      sparkle(obj.position.clone().add(new THREE.Vector3(0,2,0)), 14);
      showToast(a.follow ? `${sp.emoji}${sp.name}が ついてくるよ！` : `${sp.emoji}ここで まってるね`);
      scheduleSave();
      return;
    }
  }

  // たまごをタップしたら ゆれる → 3かいで はやく うまれる
  const eHit = raycaster.intersectObjects(eggGroup.children, false);
  if (eHit.length){
    const idx = eggs.findIndex(e => e.mesh === eHit[0].object);
    if (idx >= 0){
      const e = eggs[idx];
      e.taps++; e.kick = 1;
      note(392 + e.taps*80, 0.1, 0.2);
      if (e.taps >= 3) hatchEgg(idx);
      return;
    }
  }

  const blockMeshes = pools.map(p => p.mesh);
  const hits = raycaster.intersectObjects([...blockMeshes, ground], false);
  if (!hits.length) return;
  const hit = hits[0];

  let bx, by, bz, hitKey = null;
  if (hit.object !== ground){
    const type = hit.object.userData.type;
    hitKey = pools[type].keys[hit.instanceId];
    if (hitKey === undefined) return;
    [bx, by, bz] = hitKey.split(',').map(Number);
  }

  if (currentTool === -1){
    if (!hitKey) return;
    if (Math.hypot(bx+0.5-player.pos.x, by+0.5-(player.pos.y+1), bz+0.5-player.pos.z) > 15) return;
    const type = removeBlock(hitKey);
    if (type !== null){
      undoStack.push({ action:'remove', k:hitKey, type });
      if (undoStack.length > 200) undoStack.shift();
      eraseSound();
      sparkle(new THREE.Vector3(bx+0.5, by+0.5, bz+0.5), 6);
      scheduleSave();
    }
    return;
  }

  let x, y, z;
  if (hit.object === ground){
    x = Math.floor(hit.point.x); y = 0; z = Math.floor(hit.point.z);
  } else {
    const n = hit.face.normal;
    x = bx + Math.round(n.x);
    y = by + Math.round(n.y);
    z = bz + Math.round(n.z);
  }

  // とどくきょり（マイクラふうリーチ）
  if (Math.hypot(x+0.5-player.pos.x, y+0.5-(player.pos.y+1), z+0.5-player.pos.z) > 15) return;

  if (currentTool === -2){
    if (Math.abs(x)>LIMIT || Math.abs(z)>LIMIT || y<0 || y>HMAX) return;
    placeEgg(x, y, z);
    return;
  }

  if (addBlock(x, y, z, currentTool)){
    undoStack.push({ action:'place', k:key(x,y,z) });
    if (undoStack.length > 200) undoStack.shift();
    popSound();
    sparkle(new THREE.Vector3(x+0.5, y+1, z+0.5), 6);
    scheduleSave();
  }
}

/* ---------- どうぶつのおさんぽ ---------- */
function turnToward(g, dirX, dirZ, dt, rate){
  const targetRot = Math.atan2(dirX, dirZ) - Math.PI/2;
  let dr = targetRot - g.rotation.y;
  while (dr > Math.PI) dr -= Math.PI*2;
  while (dr < -Math.PI) dr += Math.PI*2;
  g.rotation.y += dr * Math.min(1, dt*rate);
}
function updateAnimal(a, dt, t){
  const g = a.group;
  let walking = false;
  if (a.follow){
    // しゅじんこうに ついていく
    const to = new THREE.Vector3(player.pos.x - g.position.x, 0, player.pos.z - g.position.z);
    const d = to.length();
    if (d > 18){
      // はなれすぎたら ワープしてくる
      g.position.x = player.pos.x + (Math.random()-0.5)*3;
      g.position.z = player.pos.z + (Math.random()-0.5)*3;
      a.gy = groundLevelAt(g.position.x, g.position.z);
      sparkle(g.position.clone().add(new THREE.Vector3(0,1,0)), 8);
    } else if (d > 2.2){
      walking = true;
      to.normalize();
      g.position.addScaledVector(to, dt * a.speed * 1.9);
      turnToward(g, to.x, to.z, dt, 6);
    } else {
      turnToward(g, to.x, to.z, dt, 3); // ちかくで こっちをみる
    }
  } else if (a.wait > 0){
    a.wait -= dt;
  } else {
    const to = a.target.clone().sub(g.position); to.y = 0;
    if (to.length() < 0.4){
      a.wait = 0.5 + Math.random()*2.5;
      a.target.set((Math.random()-0.5)*90, 0, (Math.random()-0.5)*90);
      a.target.x = Math.max(-45, Math.min(45, a.target.x));
      a.target.z = Math.max(-45, Math.min(45, a.target.z));
    } else {
      walking = true;
      to.normalize();
      g.position.addScaledVector(to, dt * a.speed);
      turnToward(g, to.x, to.z, dt, 4);
    }
  }
  // じめんのたかさに ついていく
  const gY = groundLevelAt(g.position.x, g.position.z);
  a.gy += (gY - a.gy) * Math.min(1, dt*8);
  let y = a.gy;
  if (a.flying){
    y += 1.4 + Math.sin(t*2.5 + a.phase) * 0.35;
  } else if (walking){
    y += Math.abs(Math.sin(t*7 + a.phase)) * 0.12;
  }
  if (a.jump > 0){
    a.jump = Math.max(0, a.jump - dt*1.6);
    y += Math.sin((1-a.jump) * Math.PI) * 1.6;
  }
  g.position.y = y;
  if (a.wings){
    const f = 0.15 + (Math.sin(t*9 + a.phase) * 0.45 + 0.45);
    a.wings.forEach(w => { w.rotation.x = -w.userData.side * f; });
  }
}

/* ---------- ワールド読みこみ ---------- */
if (!loadWorld()) buildStarter();

/* ---------- メインループ ---------- */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  updatePlayer(dt);
  animals.forEach(a => updateAnimal(a, dt, t));

  // たまご
  for(let i=eggs.length-1;i>=0;i--){
    const e = eggs[i];
    e.t += dt;
    const prog = e.t / e.hatchAt;
    e.mesh.rotation.z = Math.sin(e.t*(3 + prog*12) + e.phase) * 0.14 * (0.4 + prog);
    let s = 1;
    if (e.kick > 0){ e.kick = Math.max(0, e.kick - dt*3); s = 1 + Math.sin(e.kick*Math.PI)*0.15; }
    e.mesh.scale.set(s, 1.25*s, s);
    if (e.t >= e.hatchAt) hatchEgg(i);
  }

  // くも
  clouds.forEach((cl,i)=>{
    cl.position.x += dt * (0.4 + i*0.12);
    if (cl.position.x > 55) cl.position.x = -55;
  });

  // ブロックのぽよん
  for(let i=popAnims.length-1;i>=0;i--){
    const a = popAnims[i];
    a.t += dt*4;
    const entry = world.get(a.k);
    if (!entry){ popAnims.splice(i,1); continue; }
    if (a.t >= 1){ setInstance(entry.type, entry.id, a.x, a.y, a.z, 1); popAnims.splice(i,1); continue; }
    const s = 0.1 + (1 - Math.pow(1-a.t, 3)) * 0.9 + Math.sin(a.t*Math.PI)*0.12;
    setInstance(entry.type, entry.id, a.x, a.y, a.z, Math.min(s, 1.15));
  }

  // キラキラ
  for(let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.userData.life -= dt;
    if (s.userData.life <= 0){ scene.remove(s); s.material.dispose(); sparks.splice(i,1); continue; }
    s.position.addScaledVector(s.userData.vel, dt);
    s.userData.vel.y -= dt * 4;
    s.material.opacity = s.userData.life / 0.7;
    s.material.rotation += dt * 5;
  }

  renderer.render(scene, camera);
}
animate();
