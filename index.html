<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🦄 ゆめかわブロックワールド 🍰</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; position:fixed;
    background:linear-gradient(#ffd3ec 0%, #ffe7f3 40%, #cdf2ff 100%);
    font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic',sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none; }
  #game { position:absolute; inset:0; }
  #title {
    position:absolute; top:calc(env(safe-area-inset-top) + 8px); left:50%; transform:translateX(-50%);
    font-size:17px; font-weight:bold; color:#ff7bbd;
    background:rgba(255,255,255,.75); padding:6px 18px; border-radius:999px;
    box-shadow:0 2px 8px rgba(255,120,190,.3); white-space:nowrap; pointer-events:none; z-index:5;
  }
  #hint {
    position:absolute; top:calc(env(safe-area-inset-top) + 50px); left:50%; transform:translateX(-50%);
    font-size:14px; color:#b06bd4; background:rgba(255,255,255,.7);
    padding:4px 14px; border-radius:999px; pointer-events:none; z-index:5;
    transition:opacity 1s; white-space:nowrap;
  }
  #toast {
    position:absolute; top:36%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:22px; font-weight:bold; color:#ff5fae; text-align:center;
    background:rgba(255,255,255,.93); padding:16px 28px; border-radius:32px;
    box-shadow:0 6px 24px rgba(255,120,190,.5); z-index:20; pointer-events:none;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1); white-space:nowrap;
  }
  #toast.show { transform:translate(-50%,-50%) scale(1); }
  #toast.rare { color:#b06bd4; box-shadow:0 0 30px rgba(255,215,80,.9), 0 6px 24px rgba(180,120,255,.5); }
  #bgmBtn {
    position:absolute; top:calc(env(safe-area-inset-top) + 6px); right:10px;
    width:44px; height:44px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,.8); font-size:20px; z-index:10;
    box-shadow:0 2px 8px rgba(255,120,190,.3); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #toolbar {
    position:absolute; bottom:calc(env(safe-area-inset-bottom) + 10px); left:0; right:0;
    display:flex; gap:8px; padding:10px 12px 6px; overflow-x:auto; z-index:10;
    justify-content:flex-start; scrollbar-width:none;
  }
  #toolbar::-webkit-scrollbar { display:none; }
  .btn {
    flex:0 0 auto; width:58px; height:58px; border-radius:20px; border:3px solid #fff;
    font-size:29px; line-height:1; background:rgba(255,255,255,.85);
    box-shadow:0 3px 10px rgba(255,120,190,.35);
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s; cursor:pointer;
  }
  .btn.sel {
    transform:scale(1.18) translateY(-6px);
    border-color:#ff7bbd;
    background:#fff0f8;
    box-shadow:0 6px 16px rgba(255,120,190,.55);
  }
  .btn.egg { border-color:#ffe08a; }
  .btn.egg.sel { border-color:#ffc93c; background:#fffbe8; box-shadow:0 6px 16px rgba(255,200,60,.55); }
  .btn.small { width:48px; height:48px; font-size:22px; border-radius:16px; align-self:center; }
  .spacer { flex:1 0 8px; }
</style>
</head>
<body>
<div id="game"></div>
<div id="title">🦄 ゆめかわブロックワールド 🍰</div>
<div id="hint">🥚たまごから どうぶつが うまれるよ！</div>
<div id="toast"></div>
<button id="bgmBtn">🎵</button>
<div id="toolbar"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';

/* ---------- 基本セットアップ ---------- */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xffdff0, 55, 130);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 300);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.getElementById('game').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const sun = new THREE.DirectionalLight(0xfff2d8, 1.2);
sun.position.set(20, 40, 15);
scene.add(sun);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------- カメラ（オービット） ---------- */
let camTheta = 0, camPhi = 1.1, camRadius = 23;
const camTarget = new THREE.Vector3(0, 1.5, 0);
function updateCamera(){
  camPhi = Math.max(0.2, Math.min(1.45, camPhi));
  camRadius = Math.max(6, Math.min(45, camRadius));
  camera.position.set(
    camTarget.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta),
    camTarget.y + camRadius * Math.cos(camPhi),
    camTarget.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(camTarget);
}
updateCamera();

/* ---------- テクスチャ（キャンバスで手描き） ---------- */
function makeTex(draw){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d'); draw(g);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function drawSprinkles(g, n){
  const cols = ['#ff6fa5','#7ed9ff','#ffd94d','#b78bff','#7dffb0','#ffffff'];
  for(let i=0;i<n;i++){
    g.save();
    g.translate(Math.random()*128, Math.random()*128);
    g.rotate(Math.random()*Math.PI);
    g.fillStyle = cols[(Math.random()*cols.length)|0];
    g.fillRect(-6,-2,12,4);
    g.restore();
  }
}
function drawHeart(g, x, y, s, color){
  g.fillStyle = color;
  g.beginPath();
  g.moveTo(x, y + s*0.9);
  g.bezierCurveTo(x - s, y + s*0.25, x - s*0.55, y - s*0.55, x, y - s*0.1);
  g.bezierCurveTo(x + s*0.55, y - s*0.55, x + s, y + s*0.25, x, y + s*0.9);
  g.fill();
}
function drawStar(g, cx, cy, r, color){
  g.fillStyle = color;
  g.beginPath();
  for(let i=0;i<10;i++){
    const rr = i%2===0 ? r : r*0.45;
    const a = -Math.PI/2 + i*Math.PI/5;
    g[i===0?'moveTo':'lineTo'](cx + rr*Math.cos(a), cy + rr*Math.sin(a));
  }
  g.closePath(); g.fill();
}

const BLOCKS = [
  { name:'いちごケーキ', emoji:'🍰', tex: makeTex(g => {
      g.fillStyle = '#fff6ef'; g.fillRect(0,0,128,128);
      g.fillStyle = '#ffb7d5'; g.fillRect(0,42,128,22); g.fillRect(0,96,128,22);
      g.fillStyle = '#ffe3ef'; g.fillRect(0,0,128,20);
      drawSprinkles(g, 10);
    })},
  { name:'チョコ', emoji:'🍫', tex: makeTex(g => {
      g.fillStyle = '#9c6a44'; g.fillRect(0,0,128,128);
      g.strokeStyle = '#7a4e2f'; g.lineWidth = 6;
      g.strokeRect(8,8,50,50); g.strokeRect(70,8,50,50);
      g.strokeRect(8,70,50,50); g.strokeRect(70,70,50,50);
    })},
  { name:'キャンディ', emoji:'🍭', tex: makeTex(g => {
      g.fillStyle = '#ffffff'; g.fillRect(0,0,128,128);
      g.lineWidth = 16;
      const cols = ['#ff8fc0','#9fe8ff','#ff8fc0','#c9a5ff'];
      for(let i=-2;i<8;i++){
        g.strokeStyle = cols[(i+4)%cols.length];
        g.beginPath(); g.moveTo(i*32-20, 148); g.lineTo(i*32+60, -20); g.stroke();
      }
    })},
  { name:'ソーダ', emoji:'🫧', tex: makeTex(g => {
      g.fillStyle = '#aee9ff'; g.fillRect(0,0,128,128);
      g.fillStyle = 'rgba(255,255,255,.85)';
      for(let i=0;i<12;i++){
        g.beginPath();
        g.arc(Math.random()*128, Math.random()*128, 3+Math.random()*7, 0, 7);
        g.fill();
      }
    })},
  { name:'ハート', emoji:'💜', tex: makeTex(g => {
      g.fillStyle = '#e9d8ff'; g.fillRect(0,0,128,128);
      drawHeart(g, 64, 60, 42, '#ff86bd');
      drawHeart(g, 24, 24, 12, '#ffffff');
      drawHeart(g, 104, 100, 12, '#ffffff');
    })},
  { name:'レインボー', emoji:'🌈', tex: makeTex(g => {
      const cols = ['#ffb3ba','#ffdfba','#fff6ad','#baffc9','#bae1ff','#e3baff'];
      cols.forEach((c,i)=>{ g.fillStyle=c; g.fillRect(0, i*128/6, 128, 128/6+1); });
    })},
  { name:'おほしさま', emoji:'⭐', tex: makeTex(g => {
      g.fillStyle = '#fff1a8'; g.fillRect(0,0,128,128);
      drawStar(g, 64, 68, 40, '#ffffff');
      drawStar(g, 20, 20, 10, '#ffd94d');
      drawStar(g, 108, 108, 10, '#ffd94d');
    })},
  { name:'うんち', emoji:'💩', tex: makeTex(g => {
      g.fillStyle = '#ffe0f0'; g.fillRect(0,0,128,128);
      g.fillStyle = '#b07b52'; g.strokeStyle = '#8f6240'; g.lineWidth = 4;
      const blob = (cx,cy,rx,ry)=>{ g.beginPath(); g.ellipse(cx,cy,rx,ry,0,0,7); g.fill(); g.stroke(); };
      blob(64,98,44,20); blob(64,74,33,17); blob(64,53,22,14); blob(64,36,11,11);
      g.fillStyle = '#ffffff';
      g.beginPath(); g.arc(50,92,7,0,7); g.arc(78,92,7,0,7); g.fill();
      g.fillStyle = '#4a3428';
      g.beginPath(); g.arc(51,93,3,0,7); g.arc(79,93,3,0,7); g.fill();
      g.strokeStyle = '#4a3428'; g.lineWidth = 3;
      g.beginPath(); g.arc(64,100,8,0.3,Math.PI-0.3); g.stroke();
    })},
];
const blockMats = BLOCKS.map(b => new THREE.MeshLambertMaterial({ map:b.tex }));
const blockGeo = new THREE.BoxGeometry(1,1,1);

/* ---------- 地面 ---------- */
const groundTex = makeTex(g => {
  g.fillStyle = '#c8f5c8'; g.fillRect(0,0,128,128);
  g.fillStyle = '#b3efd2'; g.fillRect(0,0,64,64); g.fillRect(64,64,64,64);
  drawHeart(g, 32, 32, 7, 'rgba(255,170,210,.6)');
});
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
groundTex.repeat.set(60, 60);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshLambertMaterial({ map: groundTex })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ---------- にじ（背景） ---------- */
const rainbow = new THREE.Group();
['#ff9db4','#ffce9d','#fff3a0','#a9f0b8','#a5dcff','#d4b5ff'].forEach((c,i)=>{
  const arc = new THREE.Mesh(
    new THREE.TorusGeometry(26 - i*1.6, 0.8, 8, 48, Math.PI),
    new THREE.MeshBasicMaterial({ color:c, fog:false })
  );
  rainbow.add(arc);
});
rainbow.position.set(0, 0, -70);
scene.add(rainbow);

/* ---------- くも ---------- */
const clouds = [];
const cloudMat = new THREE.MeshBasicMaterial({ color:0xffffff });
for(let i=0;i<5;i++){
  const cl = new THREE.Group();
  const n = 3 + (Math.random()*3|0);
  for(let j=0;j<n;j++){
    const s = new THREE.Mesh(new THREE.SphereGeometry(1.2+Math.random(), 12, 10), cloudMat);
    s.position.set(j*1.6 - n*0.8, Math.random()*0.5, Math.random()*1.2);
    cl.add(s);
  }
  cl.position.set(Math.random()*80-40, 14+Math.random()*8, Math.random()*80-40);
  scene.add(cl); clouds.push(cl);
}

/* ---------- どうぶつモデル ---------- */
function box(parent, w,h,d, color, x,y,z){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshLambertMaterial({ color }));
  m.position.set(x,y,z); parent.add(m); return m;
}
function addWings(g, color, y, size){
  const wings = [];
  [1,-1].forEach(side => {
    const pivot = new THREE.Group();
    pivot.position.set(-0.1, y, side*0.42);
    const w = new THREE.Mesh(
      new THREE.BoxGeometry(size*0.75, 0.07, size),
      new THREE.MeshLambertMaterial({ color })
    );
    w.position.z = side * size * 0.55;
    pivot.add(w); g.add(pivot);
    pivot.userData.side = side;
    wings.push(pivot);
  });
  g.userData.wings = wings;
}
const maneCols = [0xff8fc0, 0xc9a5ff, 0x9fe8ff, 0xaaffc3];

function makeHorse(horn, wings){
  const g = new THREE.Group();
  box(g, 1.5,0.9,0.8, 0xffffff, 0,1.1,0);              // からだ
  box(g, 0.7,0.7,0.6, 0xffffff, 0.95,1.75,0);          // あたま
  box(g, 0.25,0.28,0.15, 0xff9ecf, 1.32,1.62,0);       // はな
  [-0.25,0.25].forEach(zz=>{ [-0.45,0.45].forEach(xx=>
    box(g, 0.28,0.75,0.28, 0xfff0f7, xx, 0.45, zz)); }); // あし
  if (horn){
    const h = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.6, 8),
      new THREE.MeshLambertMaterial({ color:0xffd94d }));
    h.position.set(0.95, 2.35, 0); g.add(h);
  }
  maneCols.forEach((c,i)=> box(g, 0.25,0.3,0.55, c, 0.85 - i*0.28, 2.05 - i*0.06, 0)); // たてがみ
  maneCols.forEach((c,i)=> box(g, 0.22,0.5,0.22, c, -0.85, 1.35 - i*0.18, 0));         // しっぽ
  [-1,1].forEach(s=> box(g, 0.08,0.14,0.08, 0x553344, 1.18, 1.85, s*0.24));            // め
  if (wings) addWings(g, 0xffe3f1, 1.65, 1.0);
  return g;
}
const CAT_COLS = [0xfff4e8, 0xf7bd7e, 0xc3c8d8, 0x9a8fa5];
function makeCat(ci){
  const col = CAT_COLS[ci % CAT_COLS.length];
  const g = new THREE.Group();
  box(g, 1.0,0.55,0.6, col, 0,0.65,0);                 // からだ
  box(g, 0.55,0.5,0.5, col, 0.65,1.05,0);              // あたま
  [-1,1].forEach(s=> box(g, 0.16,0.22,0.12, col, 0.72, 1.4, s*0.16));   // みみ
  [-1,1].forEach(s=> box(g, 0.08,0.1,0.06, 0xff9ecf, 0.75, 1.38, s*0.16)); // みみのなか
  box(g, 0.1,0.08,0.1, 0xff9ecf, 0.94,0.98,0);         // はな
  [-1,1].forEach(s=> box(g, 0.06,0.12,0.06, 0x4a3a45, 0.93, 1.14, s*0.13)); // め
  [-0.18,0.18].forEach(zz=>{ [-0.32,0.32].forEach(xx=>
    box(g, 0.18,0.45,0.18, col, xx, 0.22, zz)); });     // あし
  const tail = box(g, 0.55,0.14,0.12, col, -0.62, 0.95, 0);
  tail.rotation.z = 0.7;
  return g;
}
const DOG_COLS = [0xcf9d6d, 0xf5e7cb, 0x8d6b4f];
function makeDog(ci){
  const col = DOG_COLS[ci % DOG_COLS.length];
  const dark = new THREE.Color(col).multiplyScalar(0.75).getHex();
  const g = new THREE.Group();
  box(g, 1.2,0.65,0.65, col, 0,0.8,0);                 // からだ
  box(g, 0.62,0.58,0.56, col, 0.78,1.3,0);             // あたま
  box(g, 0.28,0.22,0.3, 0xfff1dc, 1.15,1.18,0);        // マズル
  box(g, 0.08,0.09,0.12, 0x5a4a42, 1.3,1.24,0);        // はな
  [-1,1].forEach(s=> box(g, 0.14,0.34,0.2, dark, 0.72, 1.28, s*0.34));  // たれみみ
  [-1,1].forEach(s=> box(g, 0.07,0.13,0.07, 0x4a3a35, 1.1, 1.44, s*0.15)); // め
  [-0.2,0.2].forEach(zz=>{ [-0.4,0.4].forEach(xx=>
    box(g, 0.2,0.55,0.2, col, xx, 0.28, zz)); });       // あし
  const tail = box(g, 0.45,0.14,0.14, dark, -0.68, 1.05, 0);
  tail.rotation.z = 0.8;
  return g;
}
function makeDragon(){
  const body = 0xa9e8c9, belly = 0xeafff3, wing = 0xd7b9ff, spike = 0xffa9cf;
  const g = new THREE.Group();
  box(g, 1.4,0.85,0.8, body, 0,1.05,0);                // からだ
  box(g, 1.0,0.55,0.84, belly, 0.1,0.85,0);            // おなか
  box(g, 0.75,0.65,0.62, body, 0.95,1.6,0);            // あたま
  box(g, 0.32,0.3,0.44, belly, 1.4,1.45,0);            // くち
  [-1,1].forEach(s=>{
    const h = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.3, 6),
      new THREE.MeshLambertMaterial({ color:0xffd94d }));
    h.position.set(0.8, 2.05, s*0.18); g.add(h);       // つの
  });
  [-1,1].forEach(s=> box(g, 0.08,0.14,0.08, 0x4a3a45, 1.28, 1.72, s*0.16)); // め
  [0.3,-0.1,-0.5].forEach((x,i)=>{
    const sp = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.3, 6),
      new THREE.MeshLambertMaterial({ color:spike }));
    sp.position.set(x, 1.6, 0); g.add(sp);             // せなかのトゲ
  });
  box(g, 0.6,0.35,0.35, body, -0.95, 1.0, 0);          // しっぽ1
  box(g, 0.45,0.22,0.22, body, -1.35, 0.95, 0);        // しっぽ2
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.28, 6),
    new THREE.MeshLambertMaterial({ color:spike }));
  tip.position.set(-1.6, 1.1, 0); g.add(tip);
  [-0.22,0.22].forEach(zz=>{ [-0.45,0.45].forEach(xx=>
    box(g, 0.26,0.5,0.26, body, xx, 0.25, zz)); });     // あし
  addWings(g, wing, 1.75, 1.3);
  return g;
}

/* ---------- どうぶつ図鑑（たまごガチャ） ---------- */
const SPECIES = [
  { id:'cat',     name:'ねこ',       emoji:'🐱', weight:37, rare:false, speed:1.9, flying:false, cols:CAT_COLS.length, build:(ci)=>makeCat(ci) },
  { id:'dog',     name:'いぬ',       emoji:'🐶', weight:37, rare:false, speed:2.2, flying:false, cols:DOG_COLS.length, build:(ci)=>makeDog(ci) },
  { id:'unicorn', name:'ユニコーン', emoji:'🦄', weight:12, rare:true,  speed:1.4, flying:false, cols:1, build:()=>makeHorse(true,false) },
  { id:'pegasus', name:'ペガサス',   emoji:'🐴', weight:8,  rare:true,  speed:1.6, flying:true,  cols:1, build:()=>makeHorse(false,true) },
  { id:'dragon',  name:'ドラゴン',   emoji:'🐲', weight:6,  rare:true,  speed:1.5, flying:true,  cols:1, build:()=>makeDragon() },
];
function rollSpecies(){
  let r = Math.random() * SPECIES.reduce((s,x)=>s+x.weight, 0);
  for(let i=0;i<SPECIES.length;i++){
    r -= SPECIES[i].weight;
    if (r < 0) return i;
  }
  return 0;
}

const animalsGroup = new THREE.Group();
scene.add(animalsGroup);
const animals = [];
const MAX_ANIMALS = 16;

function spawnAnimal(sIdx, colorIdx, x, z, silent){
  const sp = SPECIES[sIdx];
  const g = sp.build(colorIdx);
  g.position.set(x, 0, z);
  const a = {
    group:g, sIdx, colorIdx,
    speed: sp.speed, flying: sp.flying,
    baseY: sp.flying ? 1.3 : 0,
    target: new THREE.Vector3((Math.random()-0.5)*30, 0, (Math.random()-0.5)*30),
    wait: 0, jump: 0, phase: Math.random()*10,
    wings: g.userData.wings || null,
  };
  g.userData.animal = a;
  animalsGroup.add(g);
  animals.push(a);
  if (animals.length > MAX_ANIMALS){
    const old = animals.shift();
    sparkle(old.group.position.clone().add(new THREE.Vector3(0,1.5,0)), 10);
    animalsGroup.remove(old.group);
  }
  if (!silent) scheduleSave();
  return a;
}

/* ---------- ブロック管理 ---------- */
const blockGroup = new THREE.Group();
scene.add(blockGroup);
const world = new Map(); // "x,y,z" -> { mesh, type }
const undoStack = [];
const popAnims = [];
const LIMIT = 26, HMAX = 16;

function key(x,y,z){ return x+','+y+','+z; }

function addBlock(x,y,z,type, silent){
  if (Math.abs(x)>LIMIT || Math.abs(z)>LIMIT || y<0 || y>HMAX) return false;
  const k = key(x,y,z);
  if (world.has(k)) return false;
  const mesh = new THREE.Mesh(blockGeo, blockMats[type]);
  mesh.position.set(x+0.5, y+0.5, z+0.5);
  mesh.userData.key = k;
  blockGroup.add(mesh);
  world.set(k, { mesh, type });
  if (!silent){
    mesh.scale.setScalar(0.1);
    popAnims.push({ mesh, t:0 });
  }
  return true;
}
function removeBlock(k){
  const b = world.get(k);
  if (!b) return null;
  blockGroup.remove(b.mesh);
  world.delete(k);
  return b.type;
}

/* ---------- セーブ / ロード ---------- */
const SAVE_KEY = 'yumekawa-world-v2';
const OLD_KEY = 'yumekawa-world-v1';
let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    const b = [];
    world.forEach((bl,k)=>{
      const [x,y,z] = k.split(',').map(Number);
      b.push([x,y,z,bl.type]);
    });
    const a = animals.map(an => [
      an.sIdx, an.colorIdx,
      Math.round(an.group.position.x*10)/10,
      Math.round(an.group.position.z*10)/10
    ]);
    try { localStorage.setItem(SAVE_KEY, JSON.stringify({ v:3, b, a })); } catch(e){}
  }, 400);
}
function loadWorld(){
  let data = null;
  try { data = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch(e){}
  if (data && Array.isArray(data.b)){
    if (data.v === 3){
      data.b.forEach(([x,y,z,t]) => addBlock(x,y,z,t,true));
    } else {
      buildMap(); // あたらしいマップに おひっこし（どうぶつは連れていく）
    }
    (data.a||[]).forEach(([s,c,x,z]) => spawnAnimal(s,c,x,z,true));
    if (!animals.length) defaultAnimals();
    scheduleSave();
    return true;
  }
  // ふるいセーブ（v1）からの引っこし
  let old = null;
  try { old = JSON.parse(localStorage.getItem(OLD_KEY)); } catch(e){}
  if (Array.isArray(old) && old.length){
    buildMap();
    defaultAnimals();
    scheduleSave();
    return true;
  }
  return false;
}

/* ---------- ゆめかわマップ ---------- */
function candyTree(tx, tz, capType){
  addBlock(tx,0,tz,1,true); addBlock(tx,1,tz,1,true);
  for(let x=-1;x<=1;x++) for(let z=-1;z<=1;z++) addBlock(tx+x,2,tz+z, capType, true);
  addBlock(tx,3,tz, 6, true);
}
function iceCreamScoop(cx, cz, base){
  for(let x=-2;x<=2;x++) for(let z=-2;z<=2;z++) addBlock(cx+x,0,cz+z, base, true);
  for(let x=-1;x<=1;x++) for(let z=-1;z<=1;z++) addBlock(cx+x,1,cz+z, base, true);
  for(let x=-1;x<=1;x++) for(let z=-1;z<=1;z++)
    if (Math.abs(x)+Math.abs(z) < 2) addBlock(cx+x,2,cz+z, 0, true);
  addBlock(cx,3,cz,4,true); // さくらんぼハート
}
function buildMap(){
  /* ===== おかしのおしろ（きた） ===== */
  // 4本のとう（2x2 たかさ5、てっぺんはハート＆ほし）
  [[-6,-16],[5,-16],[-6,-9],[5,-9]].forEach(([tx,tz])=>{
    for(let dx=0;dx<2;dx++) for(let dz=0;dz<2;dz++)
      for(let y=0;y<5;y++) addBlock(tx+dx, y, tz+dz, y===4 ? 4 : 0, true);
    addBlock(tx,5,tz,6,true); addBlock(tx+1,5,tz+1,6,true);
  });
  // まえのかべ（もんつき）
  for(let x=-4;x<=3;x++){
    for(let y=0;y<3;y++){
      if ((x===-1||x===0) && y<2) continue; // おしろのもん
      addBlock(x,y,-9, 0, true);
    }
    if (x%2===0) addBlock(x,3,-9, 4, true); // ハートのかざり
  }
  // うしろのかべ
  for(let x=-4;x<=3;x++){
    for(let y=0;y<3;y++) addBlock(x,y,-16, 0, true);
    if (x%2===0) addBlock(x,3,-16, 4, true);
  }
  // よこのかべ
  for(let z=-14;z<=-11;z++) for(let y=0;y<3;y++){
    addBlock(-6,y,z,0,true); addBlock(6,y,z,0,true);
  }
  // ちゅうおうのキープ（キャンディやね＋ほし）
  for(let x=-1;x<=1;x++) for(let z=-14;z<=-12;z++){
    for(let y=0;y<5;y++) addBlock(x,y,z, 0, true);
    addBlock(x,5,z, 2, true);
  }
  addBlock(0,6,-13,6,true);
  // おしろのなかのにわ（レインボーとハート）
  [[-3,-11],[2,-11],[-3,-13],[2,-13]].forEach(([x,z])=> addBlock(x,0,z,4,true));

  /* ===== にじのみち（おしろから みなみへ） ===== */
  for(let z=-8; z<=10; z++){ addBlock(-1,0,z,5,true); addBlock(0,0,z,5,true); }

  /* ===== カラフルこうえん（ひがし） ===== */
  // にじのアーチ
  [[9,0],[9,1],[9,2],[10,3],[11,4],[12,4],[13,4],[14,3],[15,2],[15,1],[15,0]]
    .forEach(([x,y])=> addBlock(x,y,4,5,true));
  // おはなのはなだん（まんなかほし＋ハートのはなびら）
  [[10,8],[14,8],[12,11]].forEach(([cx,cz])=>{
    addBlock(cx,0,cz,6,true);
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dz])=> addBlock(cx+dx,0,cz+dz,4,true));
  });
  // きのこハウス（チョコのあし＋キャンディのかさ）
  [[9,-3],[13,0]].forEach(([mx,mz])=>{
    addBlock(mx,0,mz,1,true);
    addBlock(mx,1,mz,2,true);
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dz])=> addBlock(mx+dx,1,mz+dz,4,true));
  });
  // すべりだい＆ソーダプール
  addBlock(17,0,0,2,true); addBlock(17,1,0,2,true); addBlock(17,2,0,2,true);
  addBlock(17,1,1,5,true); addBlock(17,0,2,5,true);
  [[17,3],[18,3],[17,4],[18,4]].forEach(([x,z])=> addBlock(x,0,z,3,true));

  /* ===== アイスクリームマウンテン（にし） ===== */
  iceCreamScoop(-15,-4, 3);  // ソーダあじ
  iceCreamScoop(-11, 2, 2);  // キャンディあじ

  /* ===== キャンディのもり（なんせい） ===== */
  candyTree(-13, 9, 2); candyTree(-9, 12, 4);
  candyTree(-15, 14, 2); candyTree(-10, 16, 4);
  addBlock(-12,0,13,7,true); // もりにかくれた うんち（みつけてね）

  /* ===== ソーダのいけ（なんとう） ===== */
  [[8,13],[9,13],[10,13],[7,14],[8,14],[9,14],[10,14],[11,14],[8,15],[9,15],[10,15]]
    .forEach(([x,z])=> addBlock(x,0,z,3,true));
  [[4,10],[5,11],[6,12]].forEach(([x,z])=> addBlock(x,0,z,5,true)); // とびいし

  /* ===== ちらばったおかし ===== */
  [[3,3],[-3,4],[2,-3],[-4,-2],[6,7]].forEach(([x,z])=> addBlock(x,0,z,4,true));
  [[5,-5],[-6,5]].forEach(([x,z])=> addBlock(x,0,z,6,true));
}

/* ---------- おと ---------- */
let audioCtx = null, bgmGain = null;
function ensureAudio(){
  if (!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC){
      audioCtx = new AC();
      bgmGain = audioCtx.createGain();
      bgmGain.gain.value = 0.5;
      bgmGain.connect(audioCtx.destination);
    }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function note(freq, dur=0.18, vol=0.25, type='sine', when=0){
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + when;
  const o = audioCtx.createOscillator();
  const gn = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  gn.gain.setValueAtTime(vol, t0);
  gn.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const SCALE = [523, 587, 659, 784, 880, 1047];
function popSound(){ note(SCALE[(Math.random()*SCALE.length)|0], 0.15, 0.2); }
function eraseSound(){ note(220, 0.12, 0.15, 'triangle'); }
function animalSound(id){
  if (id === 'cat'){ note(880,0.1,0.22); note(1245,0.18,0.2,'sine',0.09); }
  else if (id === 'dog'){ note(220,0.08,0.28,'triangle'); note(185,0.12,0.28,'triangle',0.13); }
  else if (id === 'unicorn'){ [523,659,784,1047,1319].forEach((f,i)=> note(f,0.22,0.2,'sine',i*0.09)); }
  else if (id === 'pegasus'){ [659,830,988,1319,1661].forEach((f,i)=> note(f,0.2,0.18,'sine',i*0.08)); }
  else { note(110,0.5,0.25,'triangle'); [220,277,330,440].forEach((f,i)=> note(f,0.25,0.16,'triangle',0.15+i*0.1)); }
}
function hatchFanfare(rare){
  if (rare){
    [523,659,784,1047,784,1047,1319,1568].forEach((f,i)=> note(f,0.25,0.2,'sine',i*0.11));
    [2093,2637,3136].forEach((f,i)=> note(f,0.4,0.08,'sine',0.9+i*0.1));
  } else {
    [659,784,1047].forEach((f,i)=> note(f,0.18,0.2,'sine',i*0.09));
  }
}

/* ---------- BGM（オルゴールふう） ---------- */
const midi = n => 440 * Math.pow(2, (n-69)/12);
const BGM_STEP = 0.27;   // 8ぶおんぷ1つのながさ（びょう）≒111BPM
const BGM_LEN = 64;
const BGM_MELODY = [     // [ステップ, ノート]  C-G-Am-F しんこう
  [0,76],[2,79],[4,84],[6,79],
  [8,74],[10,79],[12,83],[14,79],
  [16,84],[18,81],[20,76],[22,81],
  [24,81],[26,77],[28,79],[30,81],
  [32,84],[34,86],[36,88],[38,84],
  [40,83],[42,79],[44,86],[46,83],
  [48,81],[50,84],[52,88],[54,84],
  [56,81],[58,79],[60,77],[62,79],
];
const BGM_BASS = [
  [0,48],[4,55],[8,43],[12,50],[16,45],[20,52],[24,53],[28,48],
  [32,48],[36,55],[40,43],[44,50],[48,45],[52,52],[56,53],[60,55],
];
let bgmOn = true, bgmStep = 0, bgmNextT = 0;
function bgmNote(f, t0, dur, vol){
  [[1, vol],[2, vol*0.28],[3, vol*0.09]].forEach(([mult, v])=>{
    const o = audioCtx.createOscillator();
    const gn = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f*mult;
    gn.gain.setValueAtTime(v, t0);
    gn.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(gn); gn.connect(bgmGain);
    o.start(t0); o.stop(t0 + dur + 0.05);
  });
}
setInterval(()=>{
  if (!audioCtx || !bgmOn || audioCtx.state !== 'running') return;
  if (bgmNextT < audioCtx.currentTime) bgmNextT = audioCtx.currentTime + 0.1;
  while (bgmNextT < audioCtx.currentTime + 0.7){
    const s = bgmStep % BGM_LEN;
    BGM_MELODY.forEach(([st,n])=>{ if (st === s) bgmNote(midi(n), bgmNextT, 1.1, 0.10); });
    BGM_BASS.forEach(([st,n])=>{ if (st === s) bgmNote(midi(n), bgmNextT, 0.9, 0.06); });
    bgmStep++; bgmNextT += BGM_STEP;
  }
}, 200);

  mesh.position.set(x+0.5, y+0.45, z+0.5);

function hatchEgg(i){
  const e = eggs[i];

    sp.rare ? `✨レア！ ${sp.name}が うまれた！${sp.emoji}✨`

/* ---------- タッチそうさ ---------- */
const pointers = new Map();
let downInfo = null;
let pinchDist = 0, pinchMid = null;
const cv = renderer.domElement;

cv.addEventListener('pointerdown', e => {
  ensureAudio();
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if (pointers.size === 1){
    downInfo = { x:e.clientX, y:e.clientY, t:performance.now(), moved:0 };
  } else if (pointers.size === 2){
    downInfo = null;
    const [a,b] = [...pointers.values()];
    pinchDist = Math.hypot(a.x-b.x, a.y-b.y);
    pinchMid = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
  }
});
cv.addEventListener('pointermove', e => {
  const p = pointers.get(e.pointerId);
  if (!p) return;
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;

  if (pointers.size === 1){
    if (downInfo) downInfo.moved += Math.abs(dx) + Math.abs(dy);
    camTheta -= dx * 0.006;
    camPhi   -= dy * 0.006;
    updateCamera();
  } else if (pointers.size === 2){
    const [a,b] = [...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    const mid = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
    if (d > 0) camRadius *= pinchDist / d;
    // 2ほんゆびドラッグで いどう
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
    right.y = 0; right.normalize();
    const fwd = new THREE.Vector3().crossVectors(camera.up, right).normalize();
    const k = camRadius * 0.0022;
    camTarget.addScaledVector(right, -(mid.x - pinchMid.x) * k);
    camTarget.addScaledVector(fwd, (mid.y - pinchMid.y) * k);
    camTarget.x = Math.max(-LIMIT, Math.min(LIMIT, camTarget.x));
    camTarget.z = Math.max(-LIMIT, Math.min(LIMIT, camTarget.z));
    pinchDist = d; pinchMid = mid;
    updateCamera();
  }
});
function endPointer(e){
  pointers.delete(e.pointerId);
  if (downInfo && pointers.size === 0){
    const dt = performance.now() - downInfo.t;
    if (downInfo.moved < 12 && dt < 500) handleTap(e.clientX, e.clientY);
    downInfo = null;
  }
}
cv.addEventListener('pointerup', endPointer);
cv.addEventListener('pointercancel', endPointer);
cv.addEventListener('wheel', e => { camRadius *= (1 + e.deltaY*0.001); updateCamera(); }, { passive:true });

/* ---------- タップでおく / けす / なでる ---------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function handleTap(cx, cy){
  ndc.set(cx/innerWidth*2-1, -(cy/innerHeight)*2+1);
  raycaster.setFromCamera(ndc, camera);

  // どうぶつをタップしたらジャンプ！
  const aHit = raycaster.intersectObjects(animalsGroup.children, true);
  if (aHit.length){
    let obj = aHit[0].object;
    while (obj.parent && obj.parent !== animalsGroup) obj = obj.parent;
    const a = obj.userData.animal;
    if (a){
      a.jump = 1;
      animalSound(SPECIES[a.sIdx].id);
      sparkle(obj.position.clone().add(new THREE.Vector3(0,2,0)), 14);
      return;
    }
  }

  // たまごをタップしたら ゆれる → 3かいで はやく うまれる
  const eHit = raycaster.intersectObjects(eggGroup.children, false);
  if (eHit.length){
    const idx = eggs.findIndex(e => e.mesh === eHit[0].object);
    if (idx >= 0){
      const e = eggs[idx];
      e.taps++; e.kick = 1;
      note(392 + e.taps*80, 0.1, 0.2);
      if (e.taps >= 3) hatchEgg(idx);
      return;
    }
  }

  const hits = raycaster.intersectObjects([...blockGroup.children, ground], false);
  if (!hits.length) return;
  const hit = hits[0];

  if (currentTool === -1){
    if (hit.object === ground) return;
    const k = hit.object.userData.key;
    const type = removeBlock(k);
    if (type !== null){
      undoStack.push({ action:'remove', k, type });
      if (undoStack.length > 200) undoStack.shift();
      eraseSound();
      sparkle(hit.object.position, 6);
      scheduleSave();
    }
    return;
  }

  let x, y, z;
  if (hit.object === ground){
    x = Math.floor(hit.point.x); y = 0; z = Math.floor(hit.point.z);
  } else {
    const p = hit.object.position; // ブロックのちゅうしん
    const n = hit.face.normal;
    x = Math.round(p.x - 0.5 + n.x);
    y = Math.round(p.y - 0.5 + n.y);
    z = Math.round(p.z - 0.5 + n.z);
  }

  if (currentTool === -2){
    if (Math.abs(x)>LIMIT || Math.abs(z)>LIMIT || y<0 || y>HMAX) return;
    placeEgg(x, y, z);
    return;
  }

  if (addBlock(x, y, z, currentTool)){
    undoStack.push({ action:'place', k:key(x,y,z) });
    if (undoStack.length > 200) undoStack.shift();
    popSound();
    sparkle(new THREE.Vector3(x+0.5, y+1, z+0.5), 6);
    scheduleSave();
  }
}

/* ---------- どうぶつのおさんぽ ---------- */
function updateAnimal(a, dt, t){
  const g = a.group;
  let walking = false;
  if (a.wait > 0){
    a.wait -= dt;
  } else {
    const to = a.target.clone().sub(g.position); to.y = 0;
    if (to.length() < 0.4){
      a.wait = 0.5 + Math.random()*2.5;
      a.target.set((Math.random()-0.5)*38, 0, (Math.random()-0.5)*38);
    } else {
      walking = true;
      to.normalize();
      g.position.addScaledVector(to, dt * a.speed);
      const targetRot = Math.atan2(to.x, to.z) - Math.PI/2;
      let dr = targetRot - g.rotation.y;
      while (dr > Math.PI) dr -= Math.PI*2;
      while (dr < -Math.PI) dr += Math.PI*2;
      g.rotation.y += dr * Math.min(1, dt*4);
    }
  }
  let y = a.baseY;
  if (a.flying){
    y += 0.4 + Math.sin(t*2.5 + a.phase) * 0.35;
  } else if (walking){
    y += Math.abs(Math.sin(t*7 + a.phase)) * 0.12;
  }
  if (a.jump > 0){
    a.jump = Math.max(0, a.jump - dt*1.6);
    y += Math.sin((1-a.jump) * Math.PI) * 1.6;
  }
  g.position.y = y;
  if (a.wings){
    const f = 0.15 + (Math.sin(t*9 + a.phase) * 0.45 + 0.45);
    a.wings.forEach(w => { w.rotation.x = -w.userData.side * f; });
  }
}

/* ---------- ワールド読みこみ ---------- */
if (!loadWorld()) buildStarter();

/* ---------- メインループ ---------- */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  animals.forEach(a => updateAnimal(a, dt, t));

  // たまご
  for(let i=eggs.length-1;i>=0;i--){
    const e = eggs[i];
    e.t += dt;
    const prog = e.t / e.hatchAt;
    e.mesh.rotation.z = Math.sin(e.t*(3 + prog*12) + e.phase) * 0.14 * (0.4 + prog);
    let s = 1;
    if (e.kick > 0){ e.kick = Math.max(0, e.kick - dt*3); s = 1 + Math.sin(e.kick*Math.PI)*0.15; }
    e.mesh.scale.set(s, 1.25*s, s);
    if (e.t >= e.hatchAt) hatchEgg(i);
  }

  // くも
  clouds.forEach((cl,i)=>{
    cl.position.x += dt * (0.4 + i*0.12);
    if (cl.position.x > 55) cl.position.x = -55;
  });

  // ブロックのぽよん
  for(let i=popAnims.length-1;i>=0;i--){
    const a = popAnims[i];
    a.t += dt*4;
    if (a.t >= 1){ a.mesh.scale.setScalar(1); popAnims.splice(i,1); continue; }
    const s = 0.1 + (1 - Math.pow(1-a.t, 3)) * 0.9 + Math.sin(a.t*Math.PI)*0.12;
    a.mesh.scale.setScalar(Math.min(s, 1.15));
  }

  // キラキラ
  for(let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.userData.life -= dt;
    if (s.userData.life <= 0){ scene.remove(s); s.material.dispose(); sparks.splice(i,1); continue; }
    s.position.addScaledVector(s.userData.vel, dt);
    s.userData.vel.y -= dt * 4;
    s.material.opacity = s.userData.life / 0.7;
    s.material.rotation += dt * 5;
  }

  renderer.render(scene, camera);
}
animate();

/* BGMボタン */
const bgmBtn = document.getElementById('bgmBtn');
bgmBtn.addEventListener('click', ()=>{
  ensureAudio();
  bgmOn = !bgmOn;
  bgmBtn.textContent = bgmOn ? '🎵' : '🔇';
  if (bgmGain) bgmGain.gain.value = bgmOn ? 0.5 : 0;
});

/* ヒントをしばらくしたら消す */
setTimeout(()=>{ document.getElementById('hint').style.opacity = 0; }, 8000);
</script>
